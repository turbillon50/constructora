kind = "web"
previewPath = "/"
title = "Castores Control"
version = "1.0.0"
id = "artifacts/castores-control"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21330

[services.development]
run = "pnpm --filter @workspace/castores-control run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/castores-control", "run", "build" ]
publicDir = "artifacts/castores-control/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21330"
BASE_PATH = "/"
